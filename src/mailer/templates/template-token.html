<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verification Code</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 24px;
      background-color: #f9fbfd;
      font-family: Arial, Helvetica, sans-serif;
      color: #0f172a;
    "
  >
    <table
      role="presentation"
      width="100%"
      cellspacing="0"
      cellpadding="0"
      border="0"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="600"
            cellspacing="0"
            cellpadding="0"
            border="0"
            style="
              background-color: #ffffff;
              border: 1px solid #e5e7eb;
              border-radius: 16px;
              overflow: hidden;
            "
          >
            <tr>
              <td
                align="center"
                style="
                  background-color: #4da3ff;
                  color: #f3f3f3;
                  padding: 32px 24px;
                  font-size: 24px;
                  font-weight: bold;
                "
              >
                {{title}}
              </td>
            </tr>

            <tr>
              <td style="padding: 32px 24px">
                <p
                  style="
                    margin: 0 0 24px;
                    color: #64748b;
                    font-size: 16px;
                    line-height: 1.6;
                  "
                >
                  {{body}}
                </p>

                <table
                  role="presentation"
                  align="center"
                  cellspacing="0"
                  cellpadding="0"
                  border="0"
                  style="margin: 0 auto 16px auto"
                >
                  <tr>
                    <td
                      style="
                        background-color: #f9fbfd;
                        border: 2px dashed #4da3ff;
                        border-radius: 10px;
                        padding: 18px 32px;
                        font-size: 24px;
                        font-weight: bold;
                        letter-spacing: 8px;
                        color: #0f172a;
                        text-align: center;
                      "
                    >
                      {{token}}
                    </td>
                  </tr>
                </table>

                <p
                  style="
                    margin: 24px 0 0;
                    color: #64748b;
                    font-size: 14px;
                    line-height: 1.6;
                  "
                >
                  Please note that this code will expire in 5 minutes.
                </p>
              </td>
            </tr>

            <tr>
              <td
                align="center"
                style="
                  padding: 20px;
                  border-top: 1px solid #e5e7eb;
                  color: #64748b;
                  font-size: 12px;
                "
              >
                This is an automated message. Please do not reply.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>

<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{title}}</title>
  </head>

  <body
    lang="{{lang}}"
    dir="{{dir}}"
    style="
      margin: 0;
      padding: 0;
      background: #f6f9fc;
      font-family: Arial, Helvetica, sans-serif;
    "
  >
    <table
      role="presentation"
      width="100%"
      cellspacing="0"
      cellpadding="0"
      border="0"
      style="margin: 0; padding: 0; width: 100%; background: #f6f9fc"
    >
      <tr>
        <td align="center" style="padding: 24px 12px">
          <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            border="0"
            style="
              max-width: 600px;
              width: 100%;
              background: #ffffff;
              border-radius: 20px;
              overflow: hidden;
              border: 1px solid #e2e8f0;
            "
          >
            <tr>
              <td align="center" style="padding: 40px 24px 24px">
                <img
                  src="cid:logo"
                  alt="Inventix"
                  width="180"
                  style="
                    display: block;
                    width: 180px;
                    max-width: 60%;
                    height: auto;
                    margin: 0 auto;
                  "
                />

                <h1
                  style="
                    margin: 20px 0 0;
                    font-size: 28px;
                    color: #0f172a;
                    text-align: center;
                  "
                >
                  {{title}}
                </h1>
              </td>
            </tr>

            <tr>
              <td style="padding: 0 32px 40px">
                <p
                  style="
                    margin: 0;
                    font-size: 16px;
                    line-height: 1.7;
                    color: #475569;
                    text-align: center;
                  "
                >
                  {{body}}
                </p>

                <div style="height: 32px"></div>

                <table
                  role="presentation"
                  width="100%"
                  cellspacing="0"
                  cellpadding="0"
                  border="0"
                >
                  <tr>
                    <td align="center">
                      <table
                        role="presentation"
                        cellspacing="0"
                        cellpadding="0"
                        border="0"
                      >
                        <tr>
                          <td
                            style="
                              background: #f8fafc;
                              border: 1px solid #dbeafe;
                              border-radius: 16px;
                              padding: 24px 32px;
                              text-align: center;
                            "
                          >
                            <div
                              style="
                                font-size: 36px;
                                font-weight: 700;
                                letter-spacing: 10px;
                                color: #4da3ff;
                                text-align: center;
                              "
                            >
                              {{token}}
                            </div>
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                </table>

                <div style="height: 24px"></div>

                <p
                  style="
                    margin: 0;
                    text-align: center;
                    color: #94a3b8;
                    font-size: 14px;
                  "
                >
                  {{info}}
                </p>

                <div style="height: 32px"></div>

                <table
                  role="presentation"
                  width="100%"
                  cellspacing="0"
                  cellpadding="0"
                  border="0"
                >
                  <tr>
                    <td
                      style="
                        background: #f8fafc;
                        border-radius: 12px;
                        padding: 16px;
                        color: #64748b;
                        font-size: 14px;
                        line-height: 1.6;
                        text-align: center;
                      "
                    >
                      {{warning}}
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <tr>
              <td
                align="center"
                style="
                  border-top: 1px solid #e2e8f0;
                  padding: 20px;
                  color: #94a3b8;
                  font-size: 12px;
                "
              >
                {{rights}}
                <br />
                {{dontReply}}
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>

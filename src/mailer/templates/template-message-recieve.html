<!DOCTYPE html>
<html dir="rtl" lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #f8fafc;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      table {
        border-spacing: 0;
      }
      td {
        padding: 0;
      }
      img {
        border: 0;
      }
      .content {
        width: 100%;
        max-width: 600px;
        margin: 0 auto;
        background-color: #ffffff;
        border-radius: 32px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <table
      width="100%"
      bgcolor="#F8FAFC"
      cellpadding="0"
      cellspacing="0"
      border="0"
    >
      <tr>
        <td align="center" style="padding: 40px 10px">
          <table
            class="content"
            cellpadding="0"
            cellspacing="0"
            border="0"
            style="
              border: 1px solid #e2e8f0;
              box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            "
          >
            <tr>
              <td
                align="center"
                style="padding: 30px; border-bottom: 1px solid #f1f5f9"
              >
                <table width="100%" cellpadding="0" cellspacing="0" border="0">
                  <tr>
                    <td align="center">
                      <table cellpadding="0" cellspacing="0" border="0">
                        <tr>
                          <td valign="middle">
                            <img
                              src="{{logo}}"
                              alt="BeSaraha"
                              width="45"
                              height="45"
                              style="display: block; border-radius: 12px"
                            />
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <tr>
              <td align="center" style="padding: 50px 40px">
                <table width="100%" cellpadding="0" cellspacing="0" border="0">
                  <tr>
                    <td align="center" style="padding-bottom: 20px">
                      <div
                        style="
                          width: 60px;
                          height: 60px;
                          background-color: #eef2ff;
                          border-radius: 20px;
                          color: #6366f1;
                          line-height: 60px;
                          font-size: 30px;
                        "
                      >
                        ✉️
                      </div>
                    </td>
                  </tr>
                  <tr>
                    <td align="center">
                      <h1
                        style="
                          margin: 0;
                          font-size: 26px;
                          font-weight: 900;
                          color: #1e293b;
                        "
                      >
                        أهلاً بك! أحدهم صارحك بشيء ما للتو!
                      </h1>
                      <p
                        style="
                          margin: 20px 0 40px 0;
                          font-size: 18px;
                          color: #64748b;
                          line-height: 1.6;
                          font-weight: 500;
                        "
                      >
                        لديك رسالة سرية جديدة تنتظرك في صندوق الوارد. هل أنت
                        مستعد لقراءتها؟
                      </p>
                    </td>
                  </tr>
                  <tr>
                    <td align="center">
                      <table cellpadding="0" cellspacing="0" border="0">
                        <tr>
                          <td
                            align="center"
                            bgcolor="#6366F1"
                            style="
                              border-radius: 18px;
                              box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
                            "
                          >
                            <a
                              href="${process.env.CLIENT_URL}/messages"
                              target="_blank"
                              style="
                                display: inline-block;
                                padding: 20px 40px;
                                font-size: 18px;
                                font-weight: bold;
                                color: #ffffff;
                                text-decoration: none;
                              "
                            >
                              عرض الرسالة السرية
                            </a>
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <tr>
              <td
                style="
                  padding: 30px 40px;
                  background-color: #f8fafc;
                  border-top: 1px solid #f1f5f9;
                "
              >
                <table width="100%" cellpadding="0" cellspacing="0" border="0">
                  <tr>
                    <td
                      align="right"
                      style="font-size: 12px; color: #94a3b8; font-weight: bold"
                    >
                      © 2026 BeSaraha
                    </td>
                    <td align="left">
                      <a
                        href="${process.env.CLIENT_URL}"
                        style="
                          font-size: 12px;
                          color: #6366f1;
                          text-decoration: none;
                          font-weight: bold;
                        "
                      >
                        زيارة الموقع
                      </a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>

          <table
            width="100%"
            cellpadding="0"
            cellspacing="0"
            border="0"
            style="max-width: 600px; margin-top: 25px"
          >
            <tr>
              <td
                align="center"
                style="font-size: 12px; color: #cbd5e1; line-height: 1.5"
              >
                أنت تتلقى هذه الرسالة لأنك عضو مسجل. <br />
                إذا لم تكن تتوقع هذا البريد، يمكنك تجاهله بأمان.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
